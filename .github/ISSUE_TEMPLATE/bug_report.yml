name: Report Bug
description: Report something that's broken or not working right.
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe the issue in detail.

        ⚠️ Please report only **one** bug per issue. Submitting multiple bugs will make the report invalid and it may be ignored or deleted.
      placeholder: "It crashed when I said the wake word..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we replicate the bug?
      placeholder: "Step-by-step instructions to trigger the issue"
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: |
        TENKA has no released versions yet — please paste the commit SHA you're running.
        Get it with: `git rev-parse --short HEAD`
      placeholder: "e.g. 31b54a8 (or 'latest main')"
    validations:
      required: true

  - type: dropdown
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`. TENKA is tested on 3.11.x.
      options:
        - "3.11.x"
        - "3.12.x"
        - "3.10.x"
        - "Other (please mention in 'What happened?')"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: TENKA is Windows-only.
      options:
        - "Windows 11"
        - "Windows 10"
        - "Other (please mention in 'What happened?')"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste the relevant lines from `assistant/debug.log` (around the time the bug happened).
        Trim aggressively — only what's needed to understand the failure.
      placeholder: "Paste log excerpt here..."
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: read_note
    attributes:
      label: Confirmation
      description: Confirm you've read the guideline above.
      options:
        - label: I confirm this report includes **only one** bug.
    validations:
      required: true
